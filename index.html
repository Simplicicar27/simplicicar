<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simplicicar — Véhicules disponibles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ══ HEADER ══ -->
  <header>
    <div class="logo-wrap">
      <div class="logo-circle">
        <svg width="32" height="32" viewBox="0 0 60 60" fill="none">
          <ellipse cx="30" cy="33" rx="22" ry="10" stroke="#E8005A" stroke-width="2"/>
          <path d="M10 33 Q18 19 30 17 Q42 19 50 33" stroke="#E8005A" stroke-width="2" fill="none"/>
          <circle cx="19" cy="36" r="4" fill="#E8005A"/>
          <circle cx="41" cy="36" r="4" fill="#E8005A"/>
          <path d="M23 25 L28 18 H36 L41 25" stroke="white" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="logo-text">SIMPLICI<span>CAR</span></div>
    </div>

    <div class="header-center">
      <div class="live-dot"></div>
      Stock disponible en agence
    </div>

    <div class="header-right">
      <div class="clock" id="clock">00:00</div>
      <div class="veh-count" id="vehCount">— véhicules</div>
    </div>
  </header>

  <!-- ══ PROGRESS BAR ══ -->
  <div class="progress-track">
    <div class="progress-fill" id="pFill"></div>
  </div>

  <!-- ══ STAGE (slides injectés par JS) ══ -->
  <div class="stage" id="stage"></div>

  <!-- ══ BARRE MINIATURES ══ -->
  <div class="thumb-bar" id="thumbBar"></div>

  <!-- Scripts -->
  <script src="data/voitures.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
